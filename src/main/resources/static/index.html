<!Doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>CPU Scheduling Simulator</title>
    <script defer src="main.js"></script>
</head>
<body>
<h1>CPU Scheduling Simulator</h1>
<label for="algorithm">Select Algorithm:</label>
<select id="algorithm">
    <option value="FCFS">FCFS</option>
    <option value="SJF">SJF</option>
    <option value="SRTF">SRTF</option>
    <option value="RR">RR</option>
    <option value="Priority">Priority</option>
</select>
<h3>Processes</h3>
<div id="processContainer"></div>
<!---<button id="add-process">Add Process</button>-->
<button class="button add-process">Add Process Modal</button>

<dialog id="process-modal">
    <h2 id="modal-title"></h2>
    <label>Arrival Time:</label>
    <input type="number" id="modal-arrival" value="0">

    <label>Burst Time:</label>
    <input type="number" id="modal-burst" value="0">

    <div style="margin-top: 15px;">
        <button id="modal-submit">Submit</button>
        <button id="modal-cancel">Cancel</button>
    </div>
</dialog>

<button id="run-algorithm">Run Simulation</button>
<h3>Results</h3>
<pre id="results"></pre>
</body>
</html>
